services:
  opensbf:
    build:
      context: ./app
      dockerfile: Dockerfile
    image: opensbf:latest
    container_name: opensbf
    restart: unless-stopped
    ports:
      # host:container — change the LEFT number if 3000 is taken on Unraid,
      # e.g. "3080:3000" → reach the app at http://<unraid-ip>:3080
      - "3000:3000"
    environment:
      - OPENSBF_DATA_DIR=/data
      - TZ=Europe/Berlin
    volumes:
      # Learning progress lives here. On Unraid this keeps it in appdata so it
      # survives container rebuilds and is included in normal appdata backups.
      # On a non-Unraid host, change the left side to any local folder.
      - /mnt/user/appdata/opensbf:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/state"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
